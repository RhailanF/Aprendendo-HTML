<!-- AS TAG'S POSSUEM A SEGUINTE ANATOMIA: -->

- Abertura
- Fechamento
- Conteúdo
- Elementos
- Atributos

<!-- EXEMPLO SEM ATRIBUTOS -->

<h1>Este é um título</h1>

<!--
- Abertura: <h1>
- Fechamento: </h1>
- Conteúdo: Este é um título
- Elemento: h1
- Atributos: Nenhum
-->

<!-- EXEMPLO COM ATRIBUTOS -->

<h1 id="title">Este é um outro título</h1>

<!--
- Abertura: <h1 id="title">
- Fechamento: </h1>
- Conteúdo: Este é um outro título
- Elemento: h1
- Atributos: id="title"
-->

<!-- EXEMPLO DE TAG VAZIA -->

<img src="imagem.jpg" alt="Descrição da imagem"> 

<!--
- Abertura: <img src="imagem.jpg" alt="Descrição da imagem">
- Fechamento: Nenhum (tag vazia)
- Conteúdo: Nenhum (tag vazia)
- Elemento: img
- Atributos: src="imagem.jpg" alt="Descrição da imagem"
-->

<!-- EXEMPLO DE TAG DE AUTOFECHAMENTO -->

<br />

<!--    
- Abertura: <br />
- Fechamento: Nenhum (tag de auto fechamento)
- Conteúdo: Nenhum (tag de auto fechamento)
- Elemento: br
- Atributos: Nenhum
-->
